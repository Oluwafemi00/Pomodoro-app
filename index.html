<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Pomodoro Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app-container">
      <div class="app-header">
        <h1>🍅 Smart Pomodoro</h1>

        <div class="app-header-controls">
          <button id="install-btn" class="hidden" title="Install App">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Install
          </button>

          <button
            id="volume-btn"
            title="Toggle Sound"
            aria-label="Toggle Sound"
          >
            <svg
              id="vol-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="timer-section" id="timer-section">
        <h2 id="active-task-label">Ready to Focus?</h2>
        <div id="session-progress-label"></div>
        <div id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="start-btn" disabled>Start</button>
          <button id="pause-btn" disabled>Pause</button>
          <button id="reset-btn" disabled>Reset</button>
        </div>
      </div>

      <hr />

      <div class="task-input-section">
        <div class="input-group task-name-group">
          <label for="task-input">Task Name</label>
          <input
            type="text"
            id="task-input"
            placeholder="e.g., Read a book"
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label for="time-input">Focus (min)</label>
          <input type="number" id="time-input" value="25" min="1" />
        </div>

        <div class="input-group">
          <label for="break-input">Break (min)</label>
          <input type="number" id="break-input" value="5" min="1" />
        </div>

        <div class="input-group">
          <label for="sessions-input">Rounds</label>
          <input type="number" id="sessions-input" value="2" min="1" />
        </div>

        <div class="input-group btn-group">
          <button id="add-task-btn">Add</button>
        </div>
      </div>

      <ul id="task-list"></ul>
    </div>

    <div class="modal-overlay" id="custom-modal">
      <div class="modal-content">
        <h3 id="modal-title">Title</h3>
        <p id="modal-message">Message goes here.</p>
        <button id="modal-btn">Continue</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
