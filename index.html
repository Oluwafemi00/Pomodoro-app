<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Pomodoro Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app-container">
      <div class="app-header">
        <h1>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            stroke="#f20707"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                d="M3 14.0497C3.65349 14.6194 5.48704 16.0839 10 16.4272M21 14C20.3975 14.5537 18.6386 16.0763 14.0106 16.4272"
                stroke="#0a9956"
                stroke-width="1.5"
                stroke-linecap="round"
              ></path>
              <path
                d="M15.5 16C14.9178 14.2522 13.8467 13.5 12 13.5C10.1533 13.5 9.08225 14.2522 8.5 16"
                stroke="#0a9956"
                stroke-width="1.5"
              ></path>
              <path
                d="M8 4.41195C7.67967 4.68738 7.5 5.08517 7.5 5.41195C7.5 6.56542 9.23858 7.41195 12 7.41195C14.7614 7.41195 16.5 6.56542 16.5 5.41195C16.5 5.08517 16.3203 4.77592 16 4.50049"
                stroke="#0a9956"
                stroke-width="1.5"
                stroke-linecap="round"
              ></path>
              <path
                d="M21 12C21.0013 13.7425 20.9053 15.4852 20.712 17.2199L20.6948 17.3739C20.4473 19.5951 18.7041 21.357 16.48 21.6342L15.5738 21.7471C15.079 21.8088 14.8316 21.8396 14.5845 21.8654C12.866 22.0449 11.1335 22.0449 9.41505 21.8654C9.16792 21.8396 8.92051 21.8088 8.42569 21.7471L7.41019 21.6206C5.24868 21.3512 3.55266 19.6422 3.30532 17.4844C2.89823 13.9329 2.89823 10.3467 3.30532 6.79516L3.32102 6.65818C3.56225 4.55367 5.15124 2.85176 7.23936 2.4614L7.4544 2.4212C10.4585 1.8596 13.541 1.8596 16.5451 2.42119L16.8681 2.48157C18.8934 2.86019 20.4367 4.50764 20.6774 6.54809C20.7345 7.03145 20.7839 7.51548 20.8258 8"
                stroke="#0a9956"
                stroke-width="1.5"
                stroke-linecap="round"
              ></path>
            </g>
          </svg>
          Smart Pomodoro
        </h1>

        <div class="app-header-controls">
          <button id="install-btn" class="hidden" title="Install App">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Install
          </button>

          <button
            id="volume-btn"
            title="Toggle Sound"
            aria-label="Toggle Sound"
          >
            <svg
              id="vol-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="timer-section" id="timer-section">
        <h2 id="active-task-label">Ready to Focus?</h2>
        <div id="session-progress-label"></div>
        <div id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="start-btn" disabled>Start</button>
          <button id="pause-btn" disabled>Pause</button>
          <button id="reset-btn" disabled>Reset</button>
        </div>
      </div>

      <hr />

      <div class="task-input-section">
        <div class="input-group task-name-group">
          <label for="task-input">Task Name</label>
          <input
            type="text"
            id="task-input"
            placeholder="e.g., Read a book"
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label for="time-input">Focus (min)</label>
          <input type="number" id="time-input" value="25" min="1" />
        </div>

        <div class="input-group">
          <label for="break-input">Break (min)</label>
          <input type="number" id="break-input" value="5" min="1" />
        </div>

        <div class="input-group">
          <label for="sessions-input">Rounds</label>
          <input type="number" id="sessions-input" value="2" min="1" />
        </div>

        <div class="input-group btn-group">
          <button id="add-task-btn">Add</button>
        </div>
      </div>

      <ul id="task-list"></ul>
    </div>

    <div class="modal-overlay" id="custom-modal">
      <div class="modal-content">
        <h3 id="modal-title">Title</h3>
        <p id="modal-message">Message goes here.</p>
        <button id="modal-btn">Continue</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
